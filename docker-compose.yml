version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: omniconvert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omniconvert
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omniconvert

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: omniconvert-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - omniconvert

  # LocalStack S3 (for local development)
  localstack:
    image: localstack/localstack:latest
    container_name: omniconvert-s3
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: 0
      AWS_DEFAULT_REGION: us-east-1
      SKIP_INFRA_DOWNLOADS: 1
    ports:
      - '4566:4566'
    networks:
      - omniconvert

volumes:
  postgres_data:
  redis_data:
  localstack_data:

networks:
  omniconvert:
    driver: bridge
